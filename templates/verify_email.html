{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-16">
  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-5 sm:p-8">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900">Vérification de l'adresse email</h1>

    {% if ok %}
      <div class="mt-6 rounded-lg border border-green-200 bg-green-50 p-4 text-green-800">
        {{ message }}
      </div>
      <div class="mt-8 flex flex-col sm:flex-row gap-3">
        <a href="/login?reason=auth_required&next=/chat" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition w-full sm:w-auto text-center">
          Aller à la connexion
        </a>
        <a href="/" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-semibold w-full sm:w-auto text-center">
          Retour à l'accueil
        </a>
      </div>
    {% else %}
      <div class="mt-6 rounded-lg border border-red-200 bg-red-50 p-4 text-red-800">
        {{ message }}
      </div>
      <div class="mt-8 flex flex-col sm:flex-row gap-3">
        <a href="/login?reason=auth_required&next=/chat" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition w-full sm:w-auto text-center">
          Ouvrir la connexion
        </a>
        <a href="/" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-semibold w-full sm:w-auto text-center">
          Retour à l'accueil
        </a>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
