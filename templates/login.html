{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-16">
  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
    <h1 class="text-3xl font-extrabold text-slate-900">Connexion requise</h1>
    <p class="mt-3 text-gray-700">{{ message }}</p>

    <div class="mt-6 rounded-lg border border-blue-100 bg-blue-50 p-4 text-sm text-blue-900">
      <p>Après connexion, vous serez redirigé vers votre destination.</p>
      <p class="mt-1"><span class="font-semibold">Destination :</span> {{ next_path }}</p>
    </div>

    <div class="mt-8 flex flex-col sm:flex-row gap-3">
      <button
        id="loginPageOpenBtn"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition w-full sm:w-auto"
      >
        Ouvrir la connexion
      </button>
      <a href="/" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-semibold w-full sm:w-auto text-center">
        Retour à l'accueil
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  window.__JR_LOGIN_CONTEXT__ = {
    reason: {{ reason|tojson }},
    next: {{ next_path|tojson }}
  };
</script>
{% endblock %}
