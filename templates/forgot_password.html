{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-16">
  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-5 sm:p-8">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900">Mot de passe oublié</h1>
    <p class="mt-3 text-gray-700">Entrez votre email. Si un compte existe, vous recevrez un lien de réinitialisation.</p>

    <div id="forgotPasswordError" class="hidden mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg font-medium"></div>
    <div id="forgotPasswordSuccess" class="hidden mt-4 p-3 bg-green-50 text-green-700 text-sm rounded-lg font-medium"></div>

    <form id="forgotPasswordForm" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" for="forgotEmail">E-mail</label>
        <input
          id="forgotEmail"
          type="email"
          required
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-600"
          placeholder="vous@exemple.com"
        />
      </div>
      <button
        type="submit"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition w-full sm:w-auto"
      >
        Envoyer le lien
      </button>
    </form>

    <div class="mt-8 flex flex-col sm:flex-row gap-3">
      <a href="/login?reason=auth_required&next=/chat" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-semibold w-full sm:w-auto text-center">
        Retour à la connexion
      </a>
      <a href="/" class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-semibold w-full sm:w-auto text-center">
        Retour à l'accueil
      </a>
    </div>
  </div>
</div>
{% endblock %}
